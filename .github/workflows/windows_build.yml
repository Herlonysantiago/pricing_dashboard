name: Gerar Executavel Windows

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout codigo
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter firebase-admin pandas openpyxl pyinstaller

    - name: Gerar EXE
      run: |
        pyinstaller --noconsole --onefile --add-data "chave-firebase.json;." main.py

    - name: Upload do Resultado
      uses: actions/upload-artifact@v4
      with:
        name: Monitor-Pricing-Windows
        path: dist/main.exe